<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>登入系統 - SMS開立事項查詢與AI審查系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-gradient-start: #667eea;
            --primary-gradient-end: #764ba2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            position: relative;
            overflow: hidden;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-container {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-main);
            transition: all 0.2s;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-sub);
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-gradient-start);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-sub);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--danger);
            font-size: 14px;
            margin-top: 16px;
            padding: 12px 16px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .error-msg.show {
            display: block;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .login-title {
                font-size: 24px;
            }

            .login-icon {
                width: 56px;
                height: 56px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-icon">🚄</div>
                <h1 class="login-title">系統登入</h1>
                <p class="login-subtitle">SMS開立事項查詢與AI審查系統</p>
            </div>

            <form onsubmit="event.preventDefault(); login();">
                <div class="form-group">
                    <label class="form-label" for="username">使用者名稱</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="請輸入使用者名稱" 
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密碼</label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="請輸入密碼" 
                            required
                            autocomplete="current-password"
                            style="padding-right: 50px;"
                        >
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" title="顯示/隱藏密碼" aria-label="顯示/隱藏密碼">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-login">登入</button>
                <div id="error-msg" class="error-msg"></div>
            </form>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // 清除之前的錯誤訊息
            errorMsg.classList.remove('show');
            errorMsg.innerText = '';

            if (!username || !password) {
                errorMsg.innerText = '請輸入帳號和密碼';
                errorMsg.classList.add('show');
                return;
            }

            const btn = document.querySelector('.btn-login');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '登入中...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();

                if (res.ok) {
                    // 檢查是否需要更新密碼
                    if (data.mustChangePassword) {
                        // 首次登入，需要更新密碼
                        sessionStorage.setItem('mustChangePassword', 'true');
                        btn.innerText = '登入成功';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 100);
                    } else {
                        // 清除視圖狀態，讓登入後顯示預設頁面
                        sessionStorage.removeItem('currentView');
                        sessionStorage.removeItem('currentDataTab');
                        sessionStorage.removeItem('currentUsersTab');
                        sessionStorage.removeItem('mustChangePassword');
                        btn.innerText = '登入成功';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 100);
                    }
                } else {
                    errorMsg.innerText = data.error || '登入失敗，請檢查帳號密碼';
                    errorMsg.classList.add('show');
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (e) {
                errorMsg.innerText = '連線錯誤，請稍後再試';
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        // 按 Enter 鍵登入
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                login();
            }
        });

        // 切換密碼顯示/隱藏
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🚫';
                toggleBtn.title = '隱藏密碼';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
                toggleBtn.title = '顯示密碼';
            }
        }

        // 自動聚焦到第一個輸入框
        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
